<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kindle Series Sale Tracker</title>
    <script src="../shared/theme-init.js"></script>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div class="header-title">
          <h1>Kindle Series</h1>
          <p id="summary" data-i18n="unscanned">未スキャン</p>
        </div>
        <select id="langToggle" class="lang-toggle" aria-label="Language">
          <option value="ja">日本語</option>
          <option value="en">English</option>
        </select>
      </header>

      <section class="control-panel" aria-labelledby="libraryActionsHeading">
        <h2 id="libraryActionsHeading" class="panel-heading" data-i18n="libraryActions">蔵書操作</h2>
        <div class="toolbar toolbar-scan">
          <button id="scanFull" class="primary-action" type="button" data-i18n="scanFull">全件取得</button>
          <button id="scanSimple" type="button" data-i18n="scanSimple" data-i18n-title="simpleScanTitle">簡易更新</button>
        </div>
        <div class="toolbar toolbar-nav">
          <button id="openLibrary" class="quiet-action" type="button" data-i18n="openLibrary">Kindle一覧</button>
          <button id="openFullPage" class="quiet-action" type="button" data-i18n="openFullPage">専用ページ</button>
        </div>
        <details class="compact-details export-details">
          <summary data-i18n="exportHeading">データ出力</summary>
          <div class="toolbar toolbar-export">
            <select id="exportRange" data-i18n-aria-label="exportRangeLabel" aria-label="出力範囲">
              <option value="0" data-i18n="exportAll">全件</option>
              <option value="100" data-i18n="exportLatest100">直近100件</option>
              <option value="500" data-i18n="exportLatest500">直近500件</option>
            </select>
            <button id="exportCsv" type="button">CSV</button>
            <button id="exportJson" type="button">JSON</button>
          </div>
        </details>
      </section>

      <p id="status" class="status" role="status"></p>
      <details class="compact-details automation-status">
        <summary id="statusHeading" data-i18n="statusHeading">実行状況</summary>
        <dl>
          <div>
            <dt data-i18n="autoScanStatusLabel">自動スキャン</dt>
            <dd id="popupAutoScanStatus">未実行</dd>
          </div>
          <div>
            <dt data-i18n="bgProbeStatusLabel">BGプローブ</dt>
            <dd id="popupBgProbeStatus">未実行</dd>
          </div>
        </dl>
      </details>

      <section class="series-section">
        <div class="section-heading">
          <h2 data-i18n="seriesCandidates">シリーズ候補</h2>
          <select id="popupSort" data-i18n-aria-label="sortLabel" aria-label="並び替え">
            <option value="discount" data-i18n="sortDiscount">割引率順</option>
            <option value="priority" data-i18n="sortPriority">優先度順</option>
          </select>
        </div>
        <div class="toolbar toolbar-bulk" aria-label="続刊確認">
          <button id="checkSimple" class="primary-action" type="button" data-i18n="checkSimpleBtn">新刊チェック</button>
          <button id="checkVisible" type="button" data-i18n="checkVisible">一括再確認</button>
        </div>
        <div id="seriesList" class="series-list"></div>
      </section>
    </main>

    <script src="../shared/kindle-library.js"></script>
    <script src="../shared/catalog-probe.js"></script>
    <script src="../shared/series-card.js"></script>
    <script src="../shared/i18n.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
